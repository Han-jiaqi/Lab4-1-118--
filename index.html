<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>定位展示知识点视图</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
  <div class="center-logo">
    <img src="1.jpg" alt="HTML CSS">
  </div>

  <div class="box html-box">
    <h4>HTML基础和HTML5</h4>
    <ul>
      <li>HTML标签与属性</li>
      <li>HTML5多媒体（视频和音频）</li>
      <li>HTML5地理定位（画布和SVG）</li>
      <li>HTML5拖放API</li>
    </ul>
  </div>

  <div class="box css-box">
    <h4>CSS基础和CSS3</h4>
    <ul>
      <li>CSS选择器</li>
      <li>CSS堆叠与定位</li>
      <li>CSS3的2D与3D转换</li>
      <li>CSS3的过渡效果</li>
    </ul>
  </div>

  <div class="box js-box">
    <h4>JavaScript</h4>
    <ul>
      <li>数据类型</li>
      <li>运算符</li>
      <li>基本语法</li>
      <li>BOM对象</li>
      <li>DOM对象</li>
      <li>DOM的事件</li>
      <li>定时器</li>
    </ul>
  </div>
</div>
</body>
</html>
